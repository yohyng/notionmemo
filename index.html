<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f1f1f" />
  <title>Instant Memo</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <section class="composer-card">
      <header class="topbar">
        <div class="brand">
          <p>Instant Memo</p>
          <h1>書き留める</h1>
        </div>
        <div class="top-actions">
          <button id="refreshButton" class="circle-button" type="button" title="最新メモを取得">↻</button>
          <button id="settingsToggle" class="circle-button" type="button" title="設定">⚙︎</button>
        </div>
      </header>

      <textarea
        id="memoInput"
        class="memo-input"
        placeholder="開いたらすぐメモ。Ctrl / Cmd + Enter で保存。"
        autocomplete="off"
        spellcheck="false"
      ></textarea>

      <section id="settingsPanel" class="settings-panel hidden">
        <label>
          <span>GAS Endpoint</span>
          <input id="endpointInput" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
        </label>

        <label>
          <span>App Secret</span>
          <input id="secretInput" type="password" placeholder="GAS側のAPP_SECRET" />
        </label>

        <label>
          <span>URL</span>
          <input id="urlInput" type="url" placeholder="https://..." />
        </label>

        <label>
          <span>Tags</span>
          <input id="tagsInput" type="text" placeholder="idea, memo" />
        </label>

        <label>
          <span>Category</span>
          <input id="categoryInput" type="text" placeholder="Memo" />
        </label>

        <label>
          <span>Device</span>
          <input id="deviceInput" type="text" placeholder="iPhone / iPad / PC" />
        </label>

        <div class="settings-actions">
          <button id="saveSettingsButton" class="secondary-button" type="button">設定を保存</button>
          <button id="flushQueueButton" class="secondary-button" type="button">未送信を再送</button>
        </div>
      </section>

      <footer class="composer-footer">
        <div class="status-line">
          <span id="statusDot" class="status-dot idle"></span>
          <span id="statusText">Ready</span>
        </div>
        <button id="sendButton" class="send-button" type="button">Send</button>
      </footer>
    </section>

    <section class="list-card">
      <header class="list-header">
        <div>
          <p>Notion DB</p>
          <h2>Recent Memos</h2>
        </div>
        <span id="queueBadge" class="queue-badge hidden">0</span>
      </header>

      <div id="memoList" class="memo-list"></div>
    </section>
  </main>

  <dialog id="editDialog" class="edit-dialog">
    <form method="dialog" class="edit-form">
      <header class="edit-header">
        <h2>メモを編集</h2>
        <button id="closeEditButton" class="circle-button" type="button">×</button>
      </header>

      <textarea id="editMemoInput" class="edit-textarea"></textarea>

      <div class="edit-grid">
        <label>
          <span>URL</span>
          <input id="editUrlInput" type="url" />
        </label>
        <label>
          <span>Tags</span>
          <input id="editTagsInput" type="text" />
        </label>
        <label>
          <span>Category</span>
          <input id="editCategoryInput" type="text" />
        </label>
      </div>

      <p id="editMeta" class="edit-meta"></p>

      <footer class="edit-actions">
        <button id="trashButton" class="danger-button" type="button">削除</button>
        <div class="edit-right-actions">
          <button id="duplicateButton" class="secondary-button" type="button">別メモとして保存</button>
          <button id="updateButton" class="send-button" type="button">更新</button>
        </div>
      </footer>
    </form>
  </dialog>

  <script src="./app.js" type="module"></script>
</body>
</html>
